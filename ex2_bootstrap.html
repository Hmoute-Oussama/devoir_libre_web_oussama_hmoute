<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Exercice 2 - Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=5">
    <style>
        .ex2-canvas {
            background-color: white;
            padding: 5px;
            max-width: 900px;
            margin: 40px auto;
        }
        
        .ex2-box {
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 18px;
            border: 4px solid #3069ad;
            box-sizing: border-box;
            width: 100%;
        }

        .h-80 { min-height: 80px; }
        .h-140 { min-height: 140px; }
        .h-120 { min-height: 120px; }

        .bg-header { background-color: #5b9bd5; }
        .bg-sec0 { background-color: #c4bd97; }
        .bg-sec1 { background-color: #c6d9f1; }
        .bg-sec2 { background-color: #e6b8b7; }
        .bg-sec3 { background-color: #c4d79b; }
        .bg-sec4 { background-color: #fabf8f; }
        .bg-sec5, .bg-sec6 { background-color: #00b0f0; }
        .bg-footer { background-color: #b3a2c7; }

        @media (max-width: 900px) {
            .h-140 { min-height: 90px; }
            .h-120 { min-height: 90px; }
        }
    </style>
</head>
<body>
    <div class="header" style="text-align: center;">
        <div class="title" style="font-size: 32px; color: #8faadc; margin-bottom: 10px;">Exercice 2 : Solution Bootstrap</div>
        <div style="color: #cccccc; margin-bottom: 20px;">Redimensionnez la fenêtre pour voir l'adaptation (Bureau / Tablette / Mobile)</div>
    </div>

    <div class="container ex2-canvas">
        <div class="row" style="--bs-gutter-x: 5px; --bs-gutter-y: 5px;">
            <div class="col-12"><div class="ex2-box bg-header h-80">En-tête de page</div></div>
            <div class="col-12"><div class="ex2-box bg-sec0 h-80">Section 0</div></div>
            
            <div class="col-12 col-md-6 col-lg-3"><div class="ex2-box bg-sec1 h-140">Section 1</div></div>
            <div class="col-12 col-md-6 col-lg-3"><div class="ex2-box bg-sec2 h-140">Section 2</div></div>
            <div class="col-12 col-md-6 col-lg-3"><div class="ex2-box bg-sec3 h-140">Section 3</div></div>
            <div class="col-12 col-md-6 col-lg-3"><div class="ex2-box bg-sec4 h-140">Section 4</div></div>
            
            <div class="col-12 col-lg-6"><div class="ex2-box bg-sec5 h-120">Section 5</div></div>
            <div class="col-12 col-lg-6"><div class="ex2-box bg-sec6 h-120">Section 6</div></div>
            
            <div class="col-12"><div class="ex2-box bg-footer h-80">Pied de page</div></div>
        </div>
    </div>

    <div style="text-align: center; margin-top: 50px;">
        <a href="compterendutp2.html" class="btn btn-outline-light" style="color: #8faadc; border-color: #8faadc;">Retour à l'accueil</a>
    </div>
</body>
</html>
